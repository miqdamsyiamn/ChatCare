<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - ChatCare</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        .contact-form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: grid;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-color);
        }

        .form-group input,
        .form-group textarea {
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--button-primary);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .contact-info {
            margin-top: 3rem;
            padding: 2rem;
            background: var(--primary-color);
            border-radius: 1rem;
            text-align: center;
        }

        .contact-info .emoji {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .contact-info p {
            margin: 0.5rem 0;
            color: var(--text-color);
        }

        .contact-info a {
            color: var(--button-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <i class="fas fa-comments"></i>
                ChatCare
            </a>
            <button class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="diskusi.html">Diskusi</a>
                <a href="laporan.html">Laporan</a>
                <a href="tentang.html">Tentang</a>
                <a href="kontak.html" class="active">Kontak</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Hubungi Kami</h1>
            <p class="tagline">Ada pertanyaan atau masukan? Kami siap membantu! 💬</p>
        </header>

        <div class="contact-container">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nama</label>
                    <input type="text" id="name" name="name" required placeholder="Masukkan nama Anda">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Masukkan email Anda">
                </div>
                <div class="form-group">
                    <label for="subject">Subjek</label>
                    <input type="text" id="subject" name="subject" required placeholder="Subjek pesan">
                </div>
                <div class="form-group">
                    <label for="message">Pesan</label>
                    <textarea id="message" name="message" required placeholder="Tulis pesan Anda di sini..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Kirim Pesan</button>
            </form>

            <div class="contact-info">
                <span class="emoji">📍</span>
                <h3>Informasi Kontak</h3>
                <p>Email: info@chatcare.com</p>
                <p>Telepon: (021) 1234-5678</p>
                <p>Alamat: Jl. Pendidikan No. 123, Jakarta</p>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu toggle
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.querySelector('.nav-links');

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('show');
        });

        // Add active class to current page
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-links a').forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        // Form submission handler
        const form = document.querySelector('.contact-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Terima kasih! Pesan Anda telah terkirim.');
            form.reset();
        });
    </script>
</body>
</html>
